
<html>
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta/>
<meta name="viewport"/>
<title>Futuristic Projectile Lab</title>
<style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 20, 25, 0.85);
            --accent-cyan: #00f2ff;
            --accent-magenta: #ff00ff;
            --text-color: #e0e0e0;
            --border-glow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-panel {
            position: absolute;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--border-glow);
        }

        #controls {
            bottom: 20px;
            left: 20px;
            width: 320px;
            z-index: 10;
        }

        #stats {
            top: 20px;
            right: 20px;
            width: 280px;
            z-index: 10;
        }

        #formula-box {
            top: 20px;
            left: 20px;
            width: 350px;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent-magenta);
        }

        h2 {
            color: var(--accent-cyan);
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-cyan);
            cursor: pointer;
        }

        .value-display {
            float: right;
            color: var(--accent-cyan);
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        button:active { transform: scale(0.95); }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        .stat-label { color: #888; }
        .stat-val { color: var(--accent-magenta); }

        .formula {
            margin-top: 10px;
            font-style: italic;
            color: #ccc;
        }

        .vector-legend {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 0.75rem;
        }

        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
<div id="canvas-container">
<canvas id="simCanvas"></canvas>
<div class="ui-panel" id="formula-box">
<h2>Physics Principles</h2>
<div class="formula">● Sign Convention: Up (+), Down (-)</div>
<div class="formula">● g = -10 m/s²</div>
<div class="formula">● v = u + at</div>
<div class="formula">● s = ut + ½at²</div>
<div class="formula">● Resultant: R = √(vₓ² + vᵧ²)</div>
</div>
<div class="ui-panel" id="stats">
<h2>Live Telemetry</h2>
<div class="stat-row"><span class="stat-label">Time (t):</span> <span class="stat-val" id="val-t">0.00</span> s</div>
<div class="stat-row"><span class="stat-label">Velocity (v):</span> <span class="stat-val" id="val-v">0.00</span> m/s</div>
<div class="stat-row"><span class="stat-label">Height (y):</span> <span class="stat-val" id="val-y">0.00</span> m</div>
<div class="stat-row"><span class="stat-label">Range (x):</span> <span class="stat-val" id="val-x">0.00</span> m</div>
<div class="vector-legend">
<div class="legend-item"><div class="dot" style="background: var(--accent-cyan)"></div> vₓ</div>
<div class="legend-item"><div class="dot" style="background: var(--accent-magenta)"></div> vᵧ</div>
<div class="legend-item"><div class="dot" style="background: #fff"></div> Resultant</div>
</div>
</div>
<div class="ui-panel" id="controls">
<h2>Parameters</h2>
<div class="control-group">
<label>Launch Angle: <span class="value-display" id="angle-display">45°</span></label>
<input id="angle-input" max="90" min="0" type="range" value="45"/>
</div>
<div class="control-group">
<label>Initial Velocity (u): <span class="value-display" id="vel-display">50 m/s</span></label>
<input id="vel-input" max="100" min="10" type="range" value="50"/>
</div>
<div class="btn-group">
<button id="btn-play">Launch</button>
<button id="btn-reset">Reset</button>
</div>
</div>
</div>
</body></html>
